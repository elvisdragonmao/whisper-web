<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Whisper 轉錄</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main>
    <header>
      <h1>🎧 Whisper 轉錄</h1>
      <div class="sub">上傳影音 → 即時預覽 → 下載 TXT / SRT</div>
    </header>

    <section class="card">
      <div class="row">
        <label class="file-label" id="fileLabel">
          <input type="file" id="file" multiple />
          選擇檔案（可多選）
        </label>
        <label class="chk">
          <input type="checkbox" id="traditional" />
          轉繁體
        </label>
      </div>

      <div id="fileList" class="file-list"></div>

      <div class="row btns">
        <button id="start">開始轉錄</button>
      </div>
    </section>

    <!-- Active jobs list -->
    <section class="card" id="activeSection" hidden>
      <div class="row head">
        <h2>進行中</h2>
      </div>
      <div id="activeJobs" class="job-list"></div>
    </section>

    <section class="card">
      <div class="row head">
        <h2>歷史</h2>
        <div class="row" style="gap:8px">
          <button class="ghost" id="batchDownloadBtn" disabled>批次下載 ZIP</button>
          <button class="ghost" id="refresh">重新整理</button>
        </div>
      </div>
      <div id="history" class="job-list">載入中…</div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
