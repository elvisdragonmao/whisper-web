<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Whisper 轉錄</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main>
    <header>
      <h1>🎧 Whisper 轉錄</h1>
      <div class="sub">上傳影音 → 即時預覽 → 下載 TXT / SRT</div>
    </header>

    <section class="card">
      <div class="row">
        <input type="file" id="file" />
        <label class="chk">
          <input type="checkbox" id="traditional" />
          轉繁體
        </label>
      </div>

      <div class="row">
        <div class="filename" id="filename" title=""></div>
      </div>

      <div class="row btns">
        <button id="start">開始</button>
        <button id="pause" disabled>暫停（取消並釋放GPU）</button>
      </div>

      <div class="row stats">
        <div id="stats">—</div>
      </div>

      <div class="progress">
        <div id="bar"></div>
      </div>

      <pre id="output"></pre>

      <div class="row downloads" id="downloads" hidden>
        <a id="txt" download>下載 TXT</a>
        <a id="srt" download>下載 SRT</a>
      </div>
    </section>

    <section class="card">
      <div class="row head">
        <h2>歷史</h2>
        <button class="ghost" id="refresh">重新整理</button>
      </div>
      <div id="history" class="history">載入中…</div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
