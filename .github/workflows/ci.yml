name: CI

on:
  pull_request:

jobs:
  lint:
    name: Lint & Format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: uv pip install --system ruff

      - name: Ruff lint
        run: ruff check app/

      - name: Ruff format check
        run: ruff format --check app/
