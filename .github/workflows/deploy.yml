name: Deploy over WireGuard

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Ruff lint
        run: uvx ruff check app/

      - name: Ruff format check
        run: uvx ruff format --check app/

  deploy:
    runs-on: ubuntu-latest
    needs: lint

    env:
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - uses: actions/checkout@v4

      - name: Verify deploy variables
        run: |
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_PATH"
          echo "DEPLOY_HOST=$DEPLOY_HOST"
          echo "DEPLOY_PATH=$DEPLOY_PATH"

      - name: Install WireGuard
        run: |
          sudo apt-get update
          sudo apt-get install -y wireguard-tools
          command -v wg
          command -v wg-quick

      - name: Write WireGuard config
        run: |
          umask 077
          cat > wg0.conf <<'EOF'
          ${{ secrets.WIREGUARD_CONFIG }}
          EOF

      - name: Bring up WireGuard
        run: |
          sudo "$(command -v wg-quick)" up ./wg0.conf
          sudo wg show

      - name: Prepare SSH key and known_hosts
        run: |
          install -d -m 700 ~/.ssh
          umask 077
          cat > ~/.ssh/id_ed25519 <<'EOF'
          ${{ secrets.DEPLOY_KEY }}
          EOF
          cat > ~/.ssh/known_hosts <<'EOF'
          ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          EOF

      - name: Run deploy script
        run: |
          ssh \
            -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd '${DEPLOY_PATH}' && ./deploy.sh"

      - name: Tear down WireGuard
        if: always()
        run: |
          if command -v wg-quick >/dev/null 2>&1; then
            sudo "$(command -v wg-quick)" down ./wg0.conf || true
          fi